<!doctype html>
<html lang="en" id="top">
<head>
<meta charset="utf-8">
<title>MAGNITUDE — The Universe in One Scrollbar</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Three journeys in one scrollbar: the observable universe from inside a proton, the 13.8 billion years since the Big Bang, and one town square redrawn every fifty years.">
<link rel="stylesheet" href="assets/css/base.css">
<link rel="stylesheet" href="assets/css/cards.css">
<link rel="stylesheet" href="assets/css/hud.css">
<link rel="stylesheet" href="assets/css/ages.css">
<script type="module" src="assets/js/main.js"></script>
</head>
<body>

<!-- the two logarithmic modes are one fragment shader; the ages mode is SVG -->
<canvas id="stage" aria-label="A continuous animated zoom through the scales of the universe, following your scroll position."></canvas>
<div id="ages" hidden></div>

<header id="intro">
  <div class="fadeout">
    <p class="over"></p>
    <h1>Magnitude</h1>
    <p class="sub"></p>
    <div class="rules"></div>
    <p class="cue"></p>
  </div>
</header>

<!-- annotations are placed along the track by whichever axis is in play -->
<div id="track"></div>

<div id="human" aria-hidden="true">
  <p class="halo"></p>
  <p class="body"></p>
  <p class="fn"></p>
</div>

<footer id="outro">
  <div>
    <h2></h2>
    <p class="big-num"></p>
    <p class="lede"></p>
    <p class="stats"></p>
    <p class="fine"></p>
  </div>
</footer>

<div id="hud" aria-hidden="true">
  <div id="wordmark"></div>
  <div id="scene-name"></div>
  <div id="scene-sub"></div>
  <div id="readout">
    <div class="exp" id="ro-exp"></div>
    <div class="pretty" id="ro-pretty"></div>
    <div class="light"><span id="ro-light-label"></span> <b id="ro-light"></b></div>
    <button id="ro-obj" class="scale-obj"></button>
  </div>
  <div id="ruler"><div class="line"></div><div id="cursor"></div></div>
</div>

<div id="goto" hidden>
  <div id="goto-title"></div>
  <div id="goto-list"></div>
</div>
<button id="mode"></button>
<button id="lang"></button>
<button id="voyage" aria-pressed="false"></button>
<button id="sound" aria-pressed="false"></button>

<noscript>
  <p class="noscript-note">Magnitude renders its three journeys live in your browser. It needs JavaScript.</p>
</noscript>

</body>
</html>
